# 股票智能顾问 · Server A 公网 Nginx（A、B 为不同服务器）
# 部署时由 setup.sh 将 __SERVER_B_HOST__、__SERVER_B_PORT__ 替换为 .env 中的值

# 静态资源缓存（减轻 A→B 延迟，约 74ms RTT）
proxy_cache_path /var/cache/nginx/stock-advisor levels=1:2 keys_zone=static_assets:32m max_size=256m inactive=7d use_temp_path=off;

upstream backend_b {
    server __SERVER_B_HOST__:__SERVER_B_PORT__;
    keepalive 32;
}

# A 本地代理服务（供 B 调用 /api/proxy/extern 访问外网 yfinance）
upstream backend_a_proxy {
    server 127.0.0.1:8000;
    keepalive 8;
}

# HTTP → HTTPS 重定向（启用 HTTPS 时生效）
server {
    listen 80 default_server;
    server_name _ visestock.com www.visestock.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _ visestock.com www.visestock.com;

    ssl_certificate /etc/nginx/ssl/stock-advisor/origin_certificate.pem;
    ssl_certificate_key /etc/nginx/ssl/stock-advisor/private_key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/stock-advisor-access.log;
    error_log /var/log/nginx/stock-advisor-error.log;

    # A 健康检查（可选，也可直接返回 200）
    location /health {
        access_log off;
        proxy_pass http://backend_a_proxy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 静态资源走 B 并缓存在 A，减少重复请求的 A→B 往返
    location ~* \.(js|css|ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot|map)$ {
        proxy_pass http://backend_b;
        proxy_http_version 1.1;
        proxy_set_header Host __SERVER_B_HOST__;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_cache static_assets;
        proxy_cache_valid 200 7d;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 分析 SSE 流：长超时、不缓冲，避免「连接分析服务器失败」/ 超时断开
    location = /api/analyze_sse {
        proxy_pass http://backend_b;
        proxy_http_version 1.1;
        proxy_set_header Host __SERVER_B_HOST__;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
        chunked_transfer_encoding on;
    }

    # 价格和财报数据接口路由到 A
    location ~ ^/api/(price|stock|dcf|financials|pepb-band) {
        proxy_pass http://backend_a_proxy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 仅 /api/proxy 走 A 本地（B 调用此外网代理）
    location /api/proxy/ {
        proxy_pass http://backend_a_proxy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 其余全部转发到 B（前端 + /api/analyze_sse 等）
    # 未备案时：用 B 的 IP 作为 Host 发往 B，可规避云侧对域名的备案校验；原始域名保留在 X-Forwarded-Host
    location / {
        proxy_pass http://backend_b;
        proxy_http_version 1.1;
        proxy_set_header Host __SERVER_B_HOST__;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }
}
